<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Speed & Velocity Game V6.2</title>
<style>
body{font-family:Tahoma,sans-serif;background:#eef3f8;text-align:center;margin:10px}
.card{background:#fff;max-width:1100px;margin:auto;padding:15px;border-radius:12px}
canvas{border:2px solid #333;background:#fff;max-width:100%}
input,button{padding:6px;margin:4px}
#timer{font-size:28px;font-weight:bold;color:#0066cc}
#stars{font-size:30px;color:gold}
</style>
</head>
<body>
<div class="card">
  <hr style="margin-top:30px">

<h3>พัฒนาโดย</h3>

<h2>นายเอกวัฒน์ ทาศรีภู</h2>

<p>โรงเรียนมหาชนะชัยวิทยาคม</p>

<p>กลุ่มสาระวิทยาศาสตร์และเทคโนโลยี</p>

<p>สำนักงานเขตพื้นที่การศึกษามัธยมศึกษาศรีสะเกษ ยโสธร</p>

</div>
<h2>🚗 เกมอัตราเร็วและความเร็ว V6.2</h2>
ชื่อ <input id="studentName">
ชั้น <input id="studentClass">
เลขที่ <input id="studentNo">
  ระดับ

<select id="level">
  <option value="easy">ง่าย (A-B-C)</option>
  <option value="hard">ยาก (A-B-C-D)</option>
</select>
<button onclick="startGame()">เริ่มเกม</button>
<div id="stars">☆☆☆☆☆</div>

<h3 id="timer">เวลา 0.0 s</h3>

<div id="info"></div>

<div id="skipInfo">ข้ามแล้ว 0/3 ครั้ง</div>

<canvas id="cv" width="800" height="500"></canvas><br>
อัตราเร็ว <input id="speedAns"> m/s
ความเร็ว <input id="velocityAns"> m/s
<br>
<button onclick="checkAnswer()">ตรวจคำตอบ</button>
<button onclick="skipQuestion()">ข้ามข้อ</button>
<button onclick="replay()">เล่นซ้ำ</button>
<div id="result"></div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbycBUGQbO3myjrjyVD8twu5VszvdDQExsYKj150uAnTcwMzhpwea-wC-2cSVRhqklgL/exec";
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
const maxSkip=10;
const carImg = new Image();
carImg.src = "car.png";
  document.getElementById("level").addEventListener("change", function(){
  currentLevel = this.value;
});
  
let score=0;
let q=0;
let currentLevel = "easy";
let skipCount=0;
let wrongCount=0;

const maxQ=2;

let scoreSent=false;

let pathPts=[];
let distance=0;
let disp=0;
let timeUsed=0;

let ansSpeed=0;
let ansVelocity=0;

function stars(){
  document.getElementById("stars").innerHTML =
  "⭐".repeat(score)+"☆".repeat(2-score);
}

function grid(){
ctx.clearRect(0,0,cv.width,cv.height);
for(let x=0;x<cv.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.strokeStyle="#ddd";ctx.stroke();}
for(let y=0;y<cv.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.strokeStyle="#ddd";ctx.stroke();}
}
  

function updateSkip(){
  document.getElementById("skipInfo").innerHTML =
    "ข้ามแล้ว " + skipCount + "/" + maxSkip + " ครั้ง";
}
async function animate(){

  grid();

  let totalSegments = pathPts.length - 1;
  let segmentFrames = 100;

  for(let seg=0; seg<totalSegments; seg++){

    let p1 = pathPts[seg];
    let p2 = pathPts[seg+1];

    for(let i=0;i<=segmentFrames;i++){

      grid();

      ctx.beginPath();
      ctx.moveTo(pathPts[0][0],pathPts[0][1]);

      for(let k=1;k<pathPts.length;k++){
        ctx.lineTo(pathPts[k][0],pathPts[k][1]);
      }

      ctx.strokeStyle="red";
      ctx.lineWidth=3;
      ctx.stroke();
      ctx.beginPath();
ctx.moveTo(
  pathPts[0][0],
  pathPts[0][1]
);

ctx.beginPath();

ctx.moveTo(
  pathPts[0][0],
  pathPts[0][1]
);

ctx.lineTo(
  pathPts[pathPts.length-1][0],
  pathPts[pathPts.length-1][1]
);

ctx.strokeStyle="blue";
ctx.lineWidth=2;
ctx.setLineDash([8,8]);
ctx.stroke();
ctx.setLineDash([]);

ctx.strokeStyle="blue";
ctx.lineWidth=2;
ctx.setLineDash([8,8]);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle="black";

ctx.fillStyle="black";

const labels = ["A","B","C","D"];

for(let i=0;i<pathPts.length;i++){

  let tx = pathPts[i][0] + 10;
  let ty = pathPts[i][1] - 10;

  if(tx > cv.width - 20){
    tx = pathPts[i][0] - 20;
  }

  if(ty < 20){
    ty = pathPts[i][1] + 20;
  }

  ctx.fillText(
    labels[i],
    tx,
    ty
  );

}
      let t=i/segmentFrames;

      let x=p1[0]+(p2[0]-p1[0])*t;
      let y=p1[1]+(p2[1]-p1[1])*t;

      ctx.save();

let angle = Math.atan2(
  p2[1]-p1[1],
  p2[0]-p1[0]
);

ctx.translate(x,y);
ctx.rotate(angle);

ctx.drawImage(
  carImg,
  -20,
  -12,
  40,
  24
);

ctx.restore();

      let progress=
      (seg+t)/totalSegments;

      document.getElementById("timer").innerText=
      "เวลา "+(timeUsed*progress).toFixed(1)+" s";

      await new Promise(r=>setTimeout(r,15));

    }

  }

  document.getElementById("info").innerHTML=
  `เวลาในการเคลื่อนที่ = ${timeUsed.toFixed(1)} วินาที`;

}

function newQuestion(){

  wrongCount=0;

 let level = currentLevel;

  let sx = 120;
  let sy = 240;

  if(level=="easy"){

    // A-B-C

    let ab = 5 + Math.floor(Math.random()*6); // 5-10
    let bc = 5 + Math.floor(Math.random()*4); // 5-8

    let ex = sx + ab*40;

    let dir;

    if(sy - bc*40 < 40){

      dir = 1;

    }
    else if(sy + bc*40 > 440){

      dir = -1;

    }
    else{

      dir = Math.random()<0.5 ? -1 : 1;

    }

    let ey = sy + dir*bc*40;

    pathPts = [
      [sx,sy],     // A
      [ex,sy],     // B
      [ex,ey]      // C
    ];

  }
  else{

    // A-B-C-D

    let ab = 5 + Math.floor(Math.random()*4); // 5-8
    let bc = 5 + Math.floor(Math.random()*4); // 5-8
    let cd = 5 + Math.floor(Math.random()*4); // 5-8

    let bx = sx + ab*40;

    let dir;

    if(sy - bc*40 < 40){

      dir = 1;

    }
    else if(sy + bc*40 > 440){

      dir = -1;

    }
    else{

      dir = Math.random()<0.5 ? -1 : 1;

    }

    let cy = sy + dir*bc*40;

    let dx = bx + cd*40;

   if(dx > 680){

  dx = 680;

}

    pathPts = [
      [sx,sy],     // A
      [bx,sy],     // B
      [bx,cy],     // C
      [dx,cy]      // D
    ];

  }

  // ระยะทาง

  distance = 0;

  for(let i=0;i<pathPts.length-1;i++){

    distance +=
      Math.abs(pathPts[i+1][0]-pathPts[i][0])/40 +
      Math.abs(pathPts[i+1][1]-pathPts[i][1])/40;

  }

  // การกระจัด

  let start = pathPts[0];
  let end   = pathPts[pathPts.length-1];

  disp = Math.sqrt(
    ((end[0]-start[0])/40)**2 +
    ((end[1]-start[1])/40)**2
  );

  timeUsed =
  distance*0.8 + Math.random()*4 + 2;

  ansSpeed =
  parseFloat(
    (distance/timeUsed).toFixed(2)
  );

  ansVelocity =
  parseFloat(
    (disp/timeUsed).toFixed(2)
  );

  document.getElementById("speedAns").value="";
  document.getElementById("velocityAns").value="";

  animate();

}
function startGame(){

  if(studentName.value.trim()==""){
    alert("กรุณากรอกชื่อ");
    return;
  }

  score=0;
  q=0;
  skipCount=0;
  wrongCount=0;
  scoreSent=false;

  currentLevel = document.getElementById("level").value; // ⭐ เก็บค่าเริ่มต้น

  stars();
  updateSkip();

  document.getElementById("result").innerHTML="";

  newQuestion();
}
function skipQuestion(){

 if(skipCount>=maxSkip){
   alert("ข้ามได้ไม่เกิน " + maxSkip + " ครั้ง");
   return;
 }

 skipCount++;
 updateSkip();

 // ❌ เอา q++ ออก (สำคัญ)

 if(q>=maxQ){
   finish();
 }else{
   newQuestion();
 }
}
  function checkAnswer(){

  let s=parseFloat(document.getElementById("speedAns").value);
  let v=parseFloat(document.getElementById("velocityAns").value);

  if(
    Math.abs(s-ansSpeed)<0.15 &&
    Math.abs(v-ansVelocity)<0.15
  ){

    score++;

    stars();

    document.getElementById("result").innerHTML=
    "✅ ถูกต้อง";

    q++;

    if(q>=maxQ){

      finish();

    }else{

      setTimeout(newQuestion,1000);

    }

  }else{

    wrongCount++;

    if(wrongCount>=2){

      document.getElementById("result").innerHTML=
      "❌ เฉลย<br>"+
      "อัตราเร็ว = "+
      ansSpeed.toFixed(2)+
      " m/s<br>"+
      "ความเร็ว = "+
      ansVelocity.toFixed(2)+
      " m/s";

      q++;

      if(q>=maxQ){

        setTimeout(finish,2000);

      }else{

        setTimeout(newQuestion,2500);

      }

    }else{

      document.getElementById("result").innerHTML=
      "❌ ลองใหม่อีกครั้ง";

    }

  }

}
  function replay(){

  animate();

}
async function saveScore(){

  if(scoreSent) return;

  scoreSent=true;

  let p=new URLSearchParams();

  p.append("name",studentName.value);
  p.append("classroom",studentClass.value);
  p.append("number",studentNo.value);

  p.append("score",score);
  p.append("skip",skipCount);

  p.append("distance",distance.toFixed(1));
  p.append("displacement",disp.toFixed(1));

  p.append("time",timeUsed.toFixed(1));

  p.append("speed",ansSpeed.toFixed(2));
  p.append("velocity",ansVelocity.toFixed(2));

  try{

    await fetch(
      SCRIPT_URL,
      {
        method:"POST",
        body:p
      }
    );

  }catch(e){

    console.log(e);

  }

}

function finish(){

  saveScore();

  let pass=
  score>=2
  ?"ผ่านเกณฑ์"
  :"ควรทบทวนเพิ่มเติม";

  document.getElementById("result").innerHTML=
  `
  <h2>🏆 สรุปผลการเรียน</h2>

  <p>
  <b>${studentName.value}</b>
  ชั้น ${studentClass.value}
  เลขที่ ${studentNo.value}
  </p>

  <p>คะแนน ${score}/2</p>

  <p>ข้าม ${skipCount} ครั้ง</p>

  <p style="color:green">
  ${pass}
  </p>

  <button onclick="window.print()">
  🖨️ พิมพ์ผลการเรียน
  </button>
  `;

}
stars();
</script>
</body>
</html>
